<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 520" role="img" aria-labelledby="title desc">
  <title id="title">Rhylounge by Remo and Lena</title>
  <desc id="desc">A clean Rhylounge logo with a tiny boat and wave mark.</desc>
  <defs>
    <linearGradient id="brandBlue" x1="120" x2="1080" y1="110" y2="410" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.45" stop-color="#8db9ff"/>
      <stop offset="1" stop-color="#2f7dff"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#001a4d" flood-opacity="0.35"/>
    </filter>
  </defs>

  <g fill="none" stroke-linecap="round" stroke-linejoin="round" filter="url(#softShadow)">
    <path d="M402 356c100-35 174-35 276-5 85 25 157 27 254-9" stroke="#2f7dff" stroke-width="18"/>
    <path d="M278 390c117 28 212-16 328-32 108-15 185 35 306 0" stroke="#ffffff" stroke-width="15" opacity="0.92"/>
    <path d="M330 416c100 16 184-15 281-31 92-15 169 17 262-5" stroke="#2f7dff" stroke-width="11" opacity="0.92"/>

    <g transform="translate(548 102)">
      <path d="M40 68h168l-38 44H78z" fill="#ffffff" stroke="#2f7dff" stroke-width="10"/>
      <path d="M92 66V22h58l28 44" stroke="#ffffff" stroke-width="12"/>
      <path d="M113 31h38" stroke="#2f7dff" stroke-width="8"/>
      <path d="M28 120c44 18 112 18 166 0" stroke="#8db9ff" stroke-width="10"/>
    </g>
  </g>

  <text x="600" y="300"
        text-anchor="middle"
        fill="url(#brandBlue)"
        font-family="Segoe Script, Brush Script MT, Lucida Handwriting, cursive"
        font-size="158"
        font-weight="700"
        letter-spacing="-5">
    Rhylounge
  </text>

  <text x="724" y="438"
        text-anchor="middle"
        fill="#ffffff"
        font-family="Inter, Segoe UI, Arial, sans-serif"
        font-size="48"
        font-weight="500"
        letter-spacing="13">
    by Remo &amp; Lena
  </text>
</svg>
